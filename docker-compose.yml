services:
  oms-gateway:
    image: ghcr.io/1305a001-ctrl/oms-gateway:latest
    container_name: oms-gateway
    restart: unless-stopped
    env_file:
      - /srv/secrets/oms-gateway.env
    ports:
      - "127.0.0.1:8003:8003"
    networks:
      - infra-net

networks:
  infra-net:
    external: true
